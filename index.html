<script>
(function(){
  function trackCv(type, href){
    const payload = { event: 'lp_cv_click', cv_type: type, href: href || '', ts: Date.now() };
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push(payload);
    if (typeof window.gtag === 'function') {
      window.gtag('event', 'lp_cv_click', { cv_type: type, href: href || '' });
    }
  }
  document.addEventListener('click', function(event){
    const link = event.target.closest('a');
    if(!link) return;
    const href = String(link.getAttribute('href') || '');
    if(/^tel:/i.test(href)) return trackCv('phone', href);
    if(/lin\.ee|line\.me/i.test(href)) return trackCv('line', href);
    if(/reserve|reservation|予約/i.test((link.textContent||'') + ' ' + href)) return trackCv('reservation', href);
  });
})();
</script>
