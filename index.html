<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護タクシーLP</title>

<style>
*{box-sizing:border-box;}

:root{
  --header-bg:#ffffff;
  --footer-bg:#ffffff;
}

html{scroll-behavior:smooth;}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:#222;
}

/* =========================
HEADER
========================= */

header{
  background:var(--header-bg);
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:1000;
  flex-wrap:nowrap;
  min-height:72px;
  overflow:hidden;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  margin-right:6px;
  flex:0 0 auto;
  min-width:0;
}

.logo-img{
  width:auto;
  height:52px;
  max-width:170px;
  object-fit:contain;
  display:none;
  flex:0 0 auto;
}

.logo-text{
  font-weight:bold;
  font-size:20px;
  line-height:1;
  white-space:nowrap;
}

/* =========================
TOP BUTTONS
========================= */

.top-buttons{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  flex:1 1 auto;
  min-width:0;
  max-width:560px;
}

.topbtn{
  padding:8px 12px;
  background:#007bff;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:14px;
}

/* =========================
MAIN
========================= */

main{
  padding:0 0 100px;
}

.section{
  padding:40px 20px;
  scroll-margin-top:90px;
}

.section-inner{
  max-width:1100px;
  margin:0 auto;
}

.section-title{
  margin:0 0 16px;
  font-size:28px;
  white-space:pre-line;
  line-height:1.45;
}

.section-text{
  line-height:1.8;
  margin:12px 0 0;
  white-space:pre-line;
}

.text-small{font-size:14px;}
.text-medium{font-size:16px;}
.text-large{font-size:20px;}

.text-left{text-align:left;}
.text-center{text-align:center;}
.text-right{text-align:right;}

.align-top .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.align-middle .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.align-bottom .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

/* =========================
IMAGE
========================= */

.normal-image-wrap{
  margin-top:16px;
}

.normal-image{
  width:100%;
  max-width:700px;
  border-radius:12px;
  display:block;
  margin:0 auto;
}

/* =========================
SLIDER
========================= */

.slider-shell{
  position:relative;
  margin-top:12px;
}

.slider-window{
  overflow:hidden;
  border-radius:12px;
}

.slider-track{
  display:flex;
  transition:transform .45s ease;
}

.slider-slide{
  min-width:100%;
}

.slider-slide img{
  width:100%;
  max-width:700px;
  height:380px;
  object-fit:contain;
  object-position:center;
  border-radius:12px;
  margin:0 auto;
  display:block;
  background:#e9ecef;
}

.slider-empty{
  background:#fff;
  padding:18px;
  border-radius:12px;
  display:inline-block;
}

.slider-dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:12px;
}

.slider-dot{
  width:10px;
  height:10px;
  border:none;
  border-radius:999px;
  background:#c9ced6;
  padding:0;
  cursor:pointer;
}

.slider-dot.active{
  background:#5c6673;
}

/* =========================
CARDS
========================= */

.card-grid-4,
.card-grid-3,
.card-grid-2{
  display:grid;
  gap:16px;
  margin-top:16px;
}

.card-grid-4{grid-template-columns:repeat(2,1fr);}
.card-grid-3{grid-template-columns:repeat(3,1fr);}
.card-grid-2{grid-template-columns:repeat(2,1fr);}

.card-item{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.card-item img{
  width:100%;
  border-radius:10px;
  display:block;
  margin-bottom:10px;
}

.card-item-title{
  margin:0 0 8px;
  font-size:18px;
  white-space:pre-line;
}

.card-link{
  display:block;
  text-decoration:none;
  color:inherit;
}

/* =========================
MEDIA
========================= */

.media-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:center;
}

.media-row img{
  width:100%;
  border-radius:12px;
}

.media-row.reverse{
  direction:rtl;
}

.media-row.reverse>*{
  direction:ltr;
}

/* =========================
BOTTOM BUTTONS
========================= */

.section-bottom-links{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}

.section-bottom-links.center{justify-content:center;}
.section-bottom-links.right{justify-content:flex-end;}

.section-bottom-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  background:#fff;
  color:#222;
  border:1px solid #d9d9d9;
  font-size:14px;
  font-weight:bold;
  line-height:1.4;
  word-break:break-word;
  flex:1 1 auto;
  max-width:280px;
}

.section-bottom-link:hover{opacity:.92}

/* =========================
FOOTER
========================= */

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:var(--footer-bg);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px;
  border-top:1px solid #ccc;
  z-index:1001;
  gap:8px;
}

.footerbtn{
  text-decoration:none;
  color:#000;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:80px;
  text-align:center;
}

.footerbtn img{
  width:52px;
  height:52px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:6px;
}

.hidden{display:none!important}

/* =========================
RESPONSIVE
========================= */

@media (max-width:768px){

.section{padding:28px 12px;}

.section-title{font-size:22px;}

.card-grid-3{
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.card-grid-2{
grid-template-columns:repeat(2,1fr);
}

.section-bottom-links{
flex-wrap:wrap;
}

.section-bottom-link{
flex:1 1 45%;
max-width:none;
}

.slider-slide img{height:260px;}
}

@media (max-width:420px){

.section-bottom-link{
flex:1 1 100%;
}

.card-grid-3{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<header>

<div class="logo" id="logoTrigger">
<img id="logoImg" class="logo-img" alt="">
<div class="logo-text" id="logoTextView">LOGO</div>
</div>

<div class="top-buttons" id="topButtons">
<a class="topbtn" id="btn1" href="#">ボタン1</a>
<a class="topbtn" id="btn2" href="#">ボタン2</a>
<a class="topbtn" id="btn3" href="#">ボタン3</a>
</div>

</header>

<main id="sectionsContainer">
<div class="empty-box">読み込み中...</div>
</main>

<footer id="footerMenu">

<a class="footerbtn" id="f1" href="#">
<img id="f1img" class="hidden">
<span id="f1text">電話</span>
</a>

<a class="footerbtn" id="f2" href="#">
<img id="f2img" class="hidden">
<span id="f2text">LINE</span>
</a>

<a class="footerbtn" id="f3" href="#">
<img id="f3img" class="hidden">
<span id="f3text">予約</span>
</a>

</footer>

<div class="adminPanel" id="adminPanel">
<h3>管理ログイン</h3>
<input type="password" id="pass" placeholder="パスワード">
<br>
<button onclick="login()">ログイン</button>
</div>

<script src="./index-sections-buttons.js"></script>

<script>

let clickCount=0;
let sitePassword="95123";

document.getElementById("logoTrigger").onclick=function(){

clickCount++;

if(clickCount>=5){

document.getElementById("adminPanel").style.display="block";
clickCount=0;

}

};

function login(){

const input=document.getElementById("pass").value;

if(input===sitePassword){

alert("管理画面ログイン成功");
location.href="./admin.html";

}else{

alert("パスワード違います");

}

}

/* ======================
ESCAPE
====================== */

function escapeHtml(text){

return String(text??"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;");

}

function escapeAttr(text){

return String(text??"")
.replaceAll("&","&amp;")
.replaceAll('"',"&quot;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;");

}

/* ======================
CONFIG
====================== */

async function loadConfig(){

const res=await fetch("./data/config.json?"+Date.now());
let config=await res.json();

if(!Array.isArray(config.buttons)){

config.buttons=[
{text:"ボタン1",link:"#",visible:true},
{text:"ボタン2",link:"#",visible:true},
{text:"ボタン3",link:"#",visible:true}
];

}

if(!Array.isArray(config.footer)){

config.footer=[
{text:"電話",link:"#",visible:true,image:""},
{text:"LINE",link:"#",visible:true,image:""},
{text:"予約",link:"#",visible:true,image:""}
];

}

const logoTextEl=document.getElementById("logoTextView");
const logoImgEl=document.getElementById("logoImg");

logoTextEl.innerText=config.logo||"";

if(config.logoImage){

logoImgEl.src=config.logoImage;
logoImgEl.style.display="block";

}else{

logoImgEl.style.display="none";

}

document.documentElement.style.setProperty("--header-bg",config.headerBgColor||"#fff");
document.documentElement.style.setProperty("--footer-bg",config.footerBgColor||"#fff");

applyTopButton("btn1",config.buttons[0],"ボタン1");
applyTopButton("btn2",config.buttons[1],"ボタン2");
applyTopButton("btn3",config.buttons[2],"ボタン3");

applyFooterButton(1,config.footer[0]);
applyFooterButton(2,config.footer[1]);
applyFooterButton(3,config.footer[2]);

sitePassword=config.password||"95123";

}

function applyTopButton(id,data,fallback){

const el=document.getElementById(id);

el.innerText=data?.text||fallback;
el.href=data?.link||"#";

if(data?.visible===false){
el.classList.add("hidden");
}else{
el.classList.remove("hidden");
}

}

function applyFooterButton(i,data){

const a=document.getElementById("f"+i);
const img=document.getElementById("f"+i+"img");
const text=document.getElementById("f"+i+"text");

text.innerText=data?.text||"";
a.href=data?.link||"#";

if(data?.visible===false){
a.classList.add("hidden");
}else{
a.classList.remove("hidden");
}

if(data?.image){
img.src=data.image;
img.classList.remove("hidden");
}else{
img.classList.add("hidden");
}

}

/* ======================
ANCHOR
====================== */

function getSectionAnchorAttr(section){

const id=String(section?.sectionId||"").trim();

if(!id)return"";

return` id="${escapeAttr(id)}"`;

}

/* ======================
SECTIONS
====================== */

function renderSection(section,idx){

if(!section.enabled)return"";

const titleAlign=section.titleAlign||"left";
const textAlign=section.textAlign||"left";

return`

<section${getSectionAnchorAttr(section)} class="section">

<div class="section-inner">

<h2 class="section-title text-${escapeAttr(titleAlign)}">${escapeHtml(section.title||"")}</h2>

<p class="section-text text-${escapeAttr(textAlign)}">${escapeHtml(section.text||"")}</p>

${window.SectionBottomButtons.render(section,escapeAttr,escapeHtml)}

</div>

</section>

`;

}

async function loadSections(){

const container=document.getElementById("sectionsContainer");

try{

const res=await fetch("./data/sections.json?"+Date.now());
let sections=await res.json();

if(!Array.isArray(sections)||sections.length===0){

container.innerHTML='<div class="empty-box">セクションがまだありません。</div>';
return;

}

container.innerHTML=sections.map(renderSection).join("");

}catch(e){

container.innerHTML='<div class="empty-box">sections.json 読み込み失敗</div>';

}

}

/* ======================
INIT
====================== */

async function init(){

await loadConfig();
await loadSections();

}

init();

</script>

</body>
</html>
