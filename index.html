<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護タクシーLP</title>
<link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
<link rel="dns-prefetch" href="//raw.githubusercontent.com">
<style>
*{
  box-sizing:border-box;
}
:root{
  --header-bg:#ffffff;
  --footer-bg:#ffffff;
}
html{
  scroll-behavior:smooth;
}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:#222;
}
header{
  background:var(--header-bg);
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:1000;
  flex-wrap:nowrap;
  min-height:72px;
  overflow:hidden;
}
.logo{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  margin-right:6px;
  flex:0 0 auto;
  min-width:0;
}
.logo-img{
  width:auto;
  height:52px;
  max-width:170px;
  object-fit:contain;
  display:none;
  flex:0 0 auto;
}
.logo-text{
  font-weight:bold;
  font-size:20px;
  line-height:1;
  white-space:nowrap;
}
.top-buttons{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:8px;
  flex:1 1 auto;
  min-width:0;
  max-width:560px;
}
.topbtn{
  padding:8px 12px;
  background:#007bff;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:14px;
}

.pc-phone-inline{
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
  min-width:0;
  padding:0 10px;
}
.pc-phone-inline a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#d64500;
  font-size:18px;
  font-weight:bold;
  line-height:1.2;
  white-space:nowrap;
}
.pc-phone-inline a:hover{
  opacity:0.9;
}


main{
  padding:0 0 100px;
}
.section{
  padding:40px 20px;
  scroll-margin-top:90px;
}
.section-inner{
  max-width:1100px;
  margin:0 auto;
}
.section-title{
  margin:0 0 16px;
  font-size:28px;
  white-space:pre-line;
  line-height:1.45;
}
.section-text{
  line-height:1.8;
  margin:12px 0 0;
  white-space:pre-line;
}
.text-small{font-size:14px;}
.text-medium{font-size:16px;}
.text-large{font-size:20px;}

.align-top .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}
.align-middle .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.align-bottom .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.text-left{text-align:left;}
.text-center{text-align:center;}
.text-right{text-align:right;}

.normal-image-wrap{
  margin-top:16px;
}
.normal-image{
  width:100%;
  max-width:700px;
  border-radius:12px;
  display:block;
  margin:0 auto;
}

.slider-shell{
  position:relative;
  margin-top:12px;
}
.slider-window{
  overflow:hidden;
  border-radius:12px;
}
.slider-track{
  display:flex;
  transition:transform 0.45s ease;
  will-change:transform;
}
.slider-slide{
  min-width:100%;
  flex:0 0 100%;
  padding:0;
}
.slider-slide a,
.slider-slide div{
  display:block;
}
.slider-slide img{
  width:100%;
  max-width:700px;
  height:380px;
  object-fit:contain;
  object-position:center;
  border-radius:12px;
  display:block;
  margin:0 auto;
  background:#e9ecef;
}
.slider-empty{
  background:#fff;
  padding:18px;
  border-radius:12px;
  display:inline-block;
}
.slider-arrow{
  display:none !important;
}
.slider-dots{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-top:12px;
}
.slider-dot{
  width:10px;
  height:10px;
  border:none;
  border-radius:999px;
  background:#c9ced6;
  padding:0;
  cursor:pointer;
}
.slider-dot.active{
  background:#5c6673;
}

.card-grid-4,
.card-grid-3,
.card-grid-2{
  display:grid;
  gap:16px;
  margin-top:16px;
}
.card-grid-4{
  grid-template-columns:repeat(2, minmax(0, 1fr));
}
.card-grid-3{
  grid-template-columns:repeat(3, 1fr);
}
.card-grid-2{
  grid-template-columns:repeat(2, 1fr);
}
.card-item{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.card-item img{
  width:100%;
  border-radius:10px;
  display:block;
  margin-bottom:10px;
}
.card-item-title{
  margin:0 0 8px;
  font-size:18px;
  white-space:pre-line;
  line-height:1.45;
}
.card-link{
  display:block;
  text-decoration:none;
  color:inherit;
}

.media-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:center;
}
.media-row img{
  width:100%;
  border-radius:12px;
  display:block;
}
.media-row.reverse{
  direction:rtl;
}
.media-row.reverse > *{
  direction:ltr;
}

.section-bottom-links{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}
.section-bottom-links.center{
  justify-content:center;
}
.section-bottom-links.right{
  justify-content:flex-end;
}
.section-bottom-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  background:#ffffff;
  color:#222;
  border:1px solid #d9d9d9;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  font-size:14px;
  font-weight:bold;
  line-height:1.4;
  max-width:100%;
  word-break:break-word;
  white-space:normal;
}
.section-bottom-link:hover{
  opacity:0.92;
}

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:var(--footer-bg);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px;
  border-top:1px solid #ccc;
  z-index:1001;
  gap:8px;
}
.footerbtn{
  text-decoration:none;
  color:#000;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:80px;
  text-align:center;
}
.footerbtn img{
  width:52px;
  height:52px;
  object-fit:cover;
  border-radius:10px;
  display:block;
  margin-bottom:6px;
}

.adminPanel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:30px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  display:none;
  z-index:2000;
  border-radius:12px;
}
.adminPanel input{
  padding:10px;
  width:220px;
  margin-bottom:10px;
}
.adminPanel button{
  padding:10px 15px;
  background:#007bff;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:8px;
}
.empty-box{
  max-width:1100px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}
.hidden{
  display:none !important;
}

@media (max-width: 768px){
  header{
    padding:10px 8px;
    gap:6px;
    flex-wrap:nowrap;
  }
  .logo{
    gap:6px;
    margin-right:4px;
  }
  .logo-img{
    height:42px;
    max-width:110px;
  }
  .logo-text{
    font-size:16px;
  }
  .pc-phone-inline{
    display:none !important;
  }
  .top-buttons{
    gap:6px;
    max-width:none;
  }
  .topbtn{
    padding:8px 6px;
    font-size:12px;
    border-radius:6px;
  }

  .section{
    padding:28px 12px;
  }
  .section-title{
    font-size:22px;
  }

  .card-grid-4{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }
  .card-grid-3{
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:10px;
  }
  .card-grid-2{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }

  .card-grid-3 .card-item{
    padding:10px;
    border-radius:12px;
  }
  .card-grid-3 .card-item img{
    margin-bottom:8px;
    border-radius:8px;
  }
  .card-grid-3 .card-item-title{
    font-size:14px;
    margin:0 0 6px;
    line-height:1.3;
  }
  .card-grid-3 .section-text{
    font-size:12px;
    line-height:1.5;
    margin:8px 0 0;
  }

  .media-row{
    grid-template-columns:1fr 1fr;
    gap:14px;
    align-items:center;
  }

  .section-bottom-links{
    display:grid;
    gap:10px;
    justify-content:stretch;
    align-items:stretch;
  }
  .section-bottom-links.count-1{
    grid-template-columns:minmax(0, 1fr);
  }
  .section-bottom-links.count-2{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }
  .section-bottom-links.count-3{
    grid-template-columns:repeat(3, minmax(0, 1fr));
  }
  .section-bottom-links.left,
  .section-bottom-links.center,
  .section-bottom-links.right{
    justify-content:stretch;
  }
  .section-bottom-link{
    width:100%;
    min-width:0;
    padding:10px 10px;
    text-align:center;
  }

  .footerbtn{
    min-width:70px;
    font-size:12px;
  }
  .footerbtn img{
    width:46px;
    height:46px;
  }
  .slider-slide img{
    height:260px;
  }
}

@media (max-width: 420px){
  header{
    padding:8px 6px;
    gap:4px;
  }
  .logo-img{
    height:38px;
    max-width:90px;
  }
  .logo-text{
    font-size:14px;
  }
  .top-buttons{
    gap:4px;
  }
  .topbtn{
    padding:7px 4px;
    font-size:11px;
  }

  .card-grid-3{
    gap:8px;
  }
  .card-grid-3 .card-item{
    padding:8px;
  }
  .card-grid-3 .card-item-title{
    font-size:13px;
  }
  .card-grid-3 .section-text{
    font-size:11px;
  }

  .section-bottom-link{
    min-width:0;
    padding:10px 8px;
    font-size:13px;
  }
}
</style>
</head>
<body>


<header>
  <div class="logo" id="logoTrigger">
    <img id="logoImg" class="logo-img" alt="" loading="eager" fetchpriority="high" decoding="async">
    <div class="logo-text" id="logoTextView">LOGO</div>
  </div>

  <div class="pc-phone-inline" id="pcPhoneInline">
    <a id="pcPhoneInlineLink" href="#" aria-label="電話予約">📞 電話予約 090-0000-0000</a>
  </div>

  <div class="top-buttons" id="topButtons">
    <a class="topbtn" id="btn1" href="#">ボタン1</a>
    <a class="topbtn" id="btn2" href="#">ボタン2</a>
    <a class="topbtn" id="btn3" href="#">ボタン3</a>
  </div>
</header>

<main id="sectionsContainer">
  <div class="empty-box">読み込み中...</div>
</main>

<footer id="footerMenu">
  <a class="footerbtn" id="f1" href="#">
    <img id="f1img" class="hidden" alt="" loading="lazy" decoding="async">
    <span id="f1text">電話</span>
  </a>
  <a class="footerbtn" id="f2" href="#">
    <img id="f2img" class="hidden" alt="" loading="lazy" decoding="async">
    <span id="f2text">LINE</span>
  </a>
  <a class="footerbtn" id="f3" href="#">
    <img id="f3img" class="hidden" alt="" loading="lazy" decoding="async">
    <span id="f3text">予約</span>
  </a>
</footer>

<div class="adminPanel" id="adminPanel">
  <h3>管理ログイン</h3>
  <input type="password" id="pass" placeholder="パスワード">
  <br>
  <button onclick="login()">ログイン</button>
</div>


<script src="./index-utils.js"></script>
<script src="./index-sections-buttons.js"></script>
<script src="./index-renderers.js"></script>
<script src="./index-slider.js"></script>
<script src="./index-main.js"></script>
</body>
</html>
