<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護タクシーLP</title>
<style>
*{
  box-sizing:border-box;
}
:root{
  --header-bg:#ffffff;
  --footer-bg:#ffffff;
}
html{
  scroll-behavior:smooth;
}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:#222;
}
header{
  background:var(--header-bg);
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:1000;
  flex-wrap:nowrap;
  min-height:72px;
  overflow:hidden;
}
.logo{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  margin-right:6px;
  flex:0 0 auto;
  min-width:0;
}
.logo-img{
  width:auto;
  height:52px;
  max-width:170px;
  object-fit:contain;
  display:none;
  flex:0 0 auto;
}
.logo-text{
  font-weight:bold;
  font-size:20px;
  line-height:1;
  white-space:nowrap;
}
.top-buttons{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:8px;
  flex:1 1 auto;
  min-width:0;
  max-width:560px;
}
.topbtn{
  padding:8px 12px;
  background:#007bff;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:14px;
}

main{
  padding:0 0 100px;
}
.section{
  padding:40px 20px;
  scroll-margin-top:90px;
}
.section-inner{
  max-width:1100px;
  margin:0 auto;
}
.section-title{
  margin:0 0 16px;
  font-size:28px;
  white-space:pre-line;
  line-height:1.45;
}
.section-text{
  line-height:1.8;
  margin:12px 0 0;
  white-space:pre-line;
}
.text-small{font-size:14px;}
.text-medium{font-size:16px;}
.text-large{font-size:20px;}

.align-top .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}
.align-middle .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.align-bottom .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.text-left{text-align:left;}
.text-center{text-align:center;}
.text-right{text-align:right;}

.normal-image-wrap{
  margin-top:16px;
}
.normal-image{
  width:100%;
  max-width:700px;
  border-radius:12px;
  display:block;
  margin:0 auto;
}

.slider-shell{
  position:relative;
  margin-top:12px;
}
.slider-window{
  overflow:hidden;
  border-radius:12px;
}
.slider-track{
  display:flex;
  transition:transform 0.45s ease;
  will-change:transform;
}
.slider-slide{
  min-width:100%;
  flex:0 0 100%;
  padding:0;
}
.slider-slide a,
.slider-slide div{
  display:block;
}
.slider-slide img{
  width:100%;
  max-width:700px;
  height:380px;
  object-fit:contain;
  object-position:center;
  border-radius:12px;
  display:block;
  margin:0 auto;
  background:#e9ecef;
}
.slider-empty{
  background:#fff;
  padding:18px;
  border-radius:12px;
  display:inline-block;
}
.slider-arrow{
  display:none !important;
}
.slider-dots{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-top:12px;
}
.slider-dot{
  width:10px;
  height:10px;
  border:none;
  border-radius:999px;
  background:#c9ced6;
  padding:0;
  cursor:pointer;
}
.slider-dot.active{
  background:#5c6673;
}

.card-grid-4,
.card-grid-3,
.card-grid-2{
  display:grid;
  gap:16px;
  margin-top:16px;
}
.card-grid-4{
  grid-template-columns:repeat(2, minmax(0, 1fr));
}
.card-grid-3{
  grid-template-columns:repeat(3, 1fr);
}
.card-grid-2{
  grid-template-columns:repeat(2, 1fr);
}
.card-item{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.card-item img{
  width:100%;
  border-radius:10px;
  display:block;
  margin-bottom:10px;
}
.card-item-title{
  margin:0 0 8px;
  font-size:18px;
  white-space:pre-line;
  line-height:1.45;
}
.card-link{
  display:block;
  text-decoration:none;
  color:inherit;
}

.media-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:center;
}
.media-row img{
  width:100%;
  border-radius:12px;
  display:block;
}
.media-row.reverse{
  direction:rtl;
}
.media-row.reverse > *{
  direction:ltr;
}

.section-bottom-links{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}
.section-bottom-links.center{
  justify-content:center;
}
.section-bottom-links.right{
  justify-content:flex-end;
}
.section-bottom-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  background:#ffffff;
  color:#222;
  border:1px solid #d9d9d9;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  font-size:14px;
  font-weight:bold;
  line-height:1.4;
  max-width:100%;
  word-break:break-word;
  white-space:normal;
}
.section-bottom-link:hover{

}

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:var(--footer-bg);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px;
  border-top:1px solid #ccc;
  z-index:1001;
  gap:8px;
}
.footerbtn{
  text-decoration:none;
  color:#000;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

}
.footerbtn img{
  width:52px;
  height:52px;
  object-fit:cover;
  border-radius:10px;

  margin-bottom:6px;

.adminPanel{

  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:30px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);

  border-radius:12px;

.adminPanel input{

  width:220px;
  margin-bottom:10px;
}
.adminPanel button{
  padding:10px 15px;
  background:#007bff;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:8px;
}
.empty-box{
  max-width:1100px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;

.hidden{
  display:none !important;

@media (max-width: 768px){
  header{

    gap:6px;
    flex-wrap:nowrap;
  }

  .card-grid-2{

  }
  .card-grid-3 .section-text{
    font-size:12px;
    line-height:1.5;

  .media-row{
    grid-template-columns:1fr 1fr;
    gap:14px;
    align-items:center;
  }

  .section-bottom-links{
    gap:10px;
    flex-wrap:nowrap;
    overflow-x:auto;
    justify-content:flex-start;
    -webkit-overflow-scrolling:touch;
  }
  .section-bottom-link{
    width:auto;
    min-width:140px;
    flex:0 0 auto;
  }

  .footerbtn{
    min-width:70px;
    font-size:12px;
  }
  .footerbtn img{
    width:46px;
    height:46px;
  }
  .slider-slide img{
    height:260px;
  }
}

@media (max-width: 420px){
  header{
    padding:8px 6px;
    gap:4px;
  }
  .logo-img{
    height:38px;
    max-width:90px;
  }
  .logo-text{
    font-size:14px;
  }
  .top-buttons{
    gap:4px;
  }
  .topbtn{
    padding:7px 4px;
    font-size:11px;
  }

  .card-grid-3{
    gap:8px;
  }
  .card-grid-3 .card-item{
    padding:8px;
  }
  .card-grid-3 .card-item-title{
    font-size:13px;
  }
  .card-grid-3 .section-text{
    font-size:11px;
  }

  .section-bottom-link{
    min-width:128px;
    padding:10px 14px;
    font-size:13px;
  }
}
</style>

function escapeHtml(text){
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(text){
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function ensureConfigShape(config){
  if(!Array.isArray(config.buttons)){
    config.buttons = [
      { text:"ボタン1", link:"#", visible:true },
      { text:"ボタン2", link:"#", visible:true },
      { text:"ボタン3", link:"#", visible:true }
    ];
  }
  while(config.buttons.length < 3){
    config.buttons.push({ text:"ボタン", link:"#", visible:true });
  }

  if(!Array.isArray(config.footer)){
    config.footer = [
      { text:"電話", link:"#", visible:true, image:"" },
      { text:"LINE", link:"#", visible:true, image:"" },
      { text:"予約", link:"#", visible:true, image:"" }
    ];
  }
  while(config.footer.length < 3){
    config.footer.push({ text:"ボタン", link:"#", visible:true, image:"" });
  }

  config.buttons = config.buttons.map((b, i) => ({
    text: b?.text || `ボタン${i + 1}`,
    link: b?.link || "#",
    visible: b?.visible !== false
  }));

  const footerDefaults = ["電話", "LINE", "予約"];
  config.footer = config.footer.map((f, i) => ({
    text: f?.text || footerDefaults[i] || "ボタン",
    link: f?.link || "#",
    visible: f?.visible !== false,
    image: f?.image || ""
  }));

  config.logoImage = config.logoImage || "";
  config.headerBgColor = config.headerBgColor || "#ffffff";
  config.footerBgColor = config.footerBgColor || "#ffffff";
  return config;
}

function ensureSectionLinks(section){
  if(!Array.isArray(section.links)){
    section.links = [];
  }
  while(section.links.length < 3){
    section.links.push({
      text: "",
      url: "#",
      visible: false
    });
  }
  section.links = section.links.slice(0, 3).map((link) => ({
    text: link?.text || "",
    url: link?.url || "#",
    visible: link?.visible === true
  }));
  return section.links;
}

function katakanaToHiragana(text){
  return String(text || '').replace(/[\u30a1-\u30f6]/g, function(char){
    return String.fromCharCode(char.charCodeAt(0) - 0x60);
  });
}

function replaceKnownJapanesePhrases(text){
  let value = String(text || '');
  const list = ROMAJI_PHRASE_MAP.slice().sort((a, b) => b[0].length - a[0].length);

  list.forEach(([jp, romaji]) => {
    value = value.split(jp).join(' ' + romaji + ' ');
  });

  return value;
}

function romanizeKana(text){
  let value = katakanaToHiragana(text);
  let result = '';

  for(let i = 0; i < value.length; i++){
    const current = value[i];
    const next = value[i + 1] || '';
    const pair = current + next;

    if(current === 'っ'){
      let nextRomaji = '';
      if(HIRAGANA_DIGRAPH_MAP[pair]){
        nextRomaji = HIRAGANA_DIGRAPH_MAP[pair];
      }else if(HIRAGANA_MAP[next]){
        nextRomaji = HIRAGANA_MAP[next];
      }
      if(nextRomaji){
        result += nextRomaji.charAt(0);
      }
      continue;
    }

    if(HIRAGANA_DIGRAPH_MAP[pair]){
      result += HIRAGANA_DIGRAPH_MAP[pair];
      i++;
      continue;
    }

    if(HIRAGANA_MAP[current]){
      result += HIRAGANA_MAP[current];
      continue;
    }

    result += current;
  }

  return result;
}

function slugifySectionId(text){
  let value = String(text || "").trim();
  value = value.normalize('NFKC');
  value = replaceKnownJapanesePhrases(value);
  value = value.replace(/&/g, ' and ');
  value = value.replace(/[／/]/g, ' ');
  value = value.replace(/[・･]/g, ' ');
  value = value.replace(/[【】「」『』（）()\[\]]/g, ' ');
  value = romanizeKana(value);
  value = value.toLowerCase();
  value = value.replace(/[^a-z0-9]+/g, '-');
  value = value.replace(/-+/g, '-');
  value = value.replace(/^-+|-+$/g, '');

  if(!value){
    value = 'section';
  }
  if(/^\d/.test(value)){
    value = 'section-' + value;
  }
  return value;
}

function ensureUniqueSectionIds(sections){
  const used = new Set();

  return sections.map((section, idx) => {
    let current = String(section?.sectionId || "").trim();

    if(!current){
      current = slugifySectionId(section?.title || section?.type || `section-${idx + 1}`);
    }else{
      current = slugifySectionId(current);
    }

    let unique = current;
    let count = 2;
    while(used.has(unique)){
      unique = `${current}-${count}`;
      count++;
    }
    used.add(unique);
    section.sectionId = unique;
    return section;
  });
}

function ensureSectionShape(section, idx){
  if(!section || typeof section !== "object"){
    section = {
      id: "section-" + idx,
      sectionId: "",
      type: "normal",
      enabled: true,
      title: "",
      text: "",
      image: "",
      link: "#",
      textSize: "medium",
      bgColor: "#ffffff",
      alignY: "middle",
      titleAlign: "left",
      textAlign: "left"
    };
  }

  section.id = section.id || ("section-" + idx);
  section.sectionId = section.sectionId || "";
  section.type = section.type || "normal";
  section.enabled = section.enabled !== false;
  section.title = section.title || "";
  section.text = section.text || "";
  section.image = section.image || "";
  section.link = section.link || "#";
  section.textSize = section.textSize || "medium";
  section.bgColor = section.bgColor || "#ffffff";
  section.alignY = section.alignY || "middle";
  section.titleAlign = section.titleAlign || "left";
  section.textAlign = section.textAlign || "left";

  if(!Array.isArray(section.images)) section.images = [];
  if(!Array.isArray(section.items)) section.items = [];

  if(Array.isArray(section.items)){
    section.items = section.items.map((item) => ({
      title: item?.title || "",
      text: item?.text || "",
      image: item?.image || "",
      link: item?.link || "#"
    }));
  }

  ensureSectionLinks(section);
  return section;
}

function getSectionAnchorAttr(section){
    let  id = String(section?.sectionId || "").trim();
  if(!id) return "";
   id = slugifySectionId(id);
  return ` id="${escapeAttr(id)}"`;
}

function applyTopButton(el, data, fallbackText){
  el.innerText = data?.text || fallbackText;
  el.href = data?.link || "#";
  if(data?.visible === false){
    el.classList.add("hidden");
  }else{
    el.classList.remove("hidden");
  }
}

function applyFooterButton(anchorEl, imgEl, textEl, data, fallbackText){
  textEl.innerText = data?.text || fallbackText;
  anchorEl.href = data?.link || "#";

  if(data?.visible === false){
    anchorEl.classList.add("hidden");
  }else{
    anchorEl.classList.remove("hidden");
  }

  if(data?.image){
    imgEl.src = data.image;
    imgEl.classList.remove("hidden");
  }else{
    imgEl.src = "";
    imgEl.classList.add("hidden");
  }
}

async function loadConfig(){
  const res = await fetch("./data/config.json?" + Date.now());
  let config = await res.json();
  config = ensureConfigShape(config);

  const logoTextEl = document.getElementById("logoTextView");
  const logoImgEl = document.getElementById("logoImg");

  logoTextEl.innerText = config.logo || "";
  if(config.logoImage){
    logoImgEl.src = config.logoImage;
    logoImgEl.style.display = "block";
  }else{
    logoImgEl.src = "";
    logoImgEl.style.display = "none";
  }

  document.documentElement.style.setProperty("--header-bg", config.headerBgColor);
  document.documentElement.style.setProperty("--footer-bg", config.footerBgColor);

  applyTopButton(document.getElementById("btn1"), config.buttons[0], "ボタン1");
  applyTopButton(document.getElementById("btn2"), config.buttons[1], "ボタン2");
  applyTopButton(document.getElementById("btn3"), config.buttons[2], "ボタン3");

  applyFooterButton(
    document.getElementById("f1"),
    document.getElementById("f1img"),
    document.getElementById("f1text"),
    config.footer[0],
    "電話"
  );
  applyFooterButton(
    document.getElementById("f2"),
    document.getElementById("f2img"),
    document.getElementById("f2text"),
    config.footer[1],
    "LINE"
  );
  applyFooterButton(
    document.getElementById("f3"),
    document.getElementById("f3img"),
    document.getElementById("f3text"),
    config.footer[2],
    "予約"
  );

  sitePassword = config.password || "95123";
}

function wrapLink(link, innerHtml, className = ""){
  if(link && link !== "#"){
    return `<a href="${escapeAttr(link)}" target="_blank" rel="noopener noreferrer" class="${escapeAttr(className)}">${innerHtml}</a>`;
  }
  return innerHtml;
}

function renderSectionBottomLinks(section){
  if(window.SectionBottomButtons && typeof window.SectionBottomButtons.render === "function"){
    return window.SectionBottomButtons.render(section, escapeAttr, escapeHtml);
  }
  return "";
}

function renderNormal(section){
  const imageHtml = section.image
    ? `<img class="normal-image" src="${escapeAttr(section.image)}" alt="${escapeAttr(section.title || "")}">`
    : "";
  const linkedImage = wrapLink(section.link || "#", imageHtml, "");

  return `
    <section${getSectionAnchorAttr(section)} class="section align-${escapeAttr(section.alignY || "middle")}" style="background:${escapeAttr(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title text-${escapeAttr(section.titleAlign || "left")}">${escapeHtml(section.title || "")}</h2>
        <div class="normal-image-wrap">${linkedImage}</div>
        <p class="section-text text-${escapeAttr(section.textSize || "medium")} text-${escapeAttr(section.textAlign || "left")}">${escapeHtml(section.text || "")}</p>
        ${renderSectionBottomLinks(section)}
      </div>
    </section>
  `;
}

function renderSlider(section, idx){
  const images = Array.isArray(section.images) ? section.images : [];
  const slides = images.length
    ? images.map(src => {
        const image = `<img src="${escapeAttr(src)}" alt="${escapeAttr(section.title || "")}">`;
        return `<div class="slider-slide">${wrapLink(section.link || "#", image, "")}</div>`;
      }).join("")
    : `<div class="slider-empty">画像がまだありません</div>`;

  const dots = images.length > 1
    ? `<div class="slider-dots" id="slider-dots-${idx}"></div>`
    : "";

  return `
    <section${getSectionAnchorAttr(section)} class="section align-${escapeAttr(section.alignY || "middle")}" style="background:${escapeAttr(section.bgColor || "#f8f9fa")}">
      <div class="section-inner">
        <h2 class="section-title text-${escapeAttr(section.titleAlign || "left")}">${escapeHtml(section.title || "")}</h2>
        <div class="slider-shell" data-slider-index="${idx}">
          <div class="slider-window">
            <div class="slider-track" id="slider-track-${idx}">
              ${slides}
            </div>
          </div>
          ${dots}
        </div>
        <p class="section-text text-${escapeAttr(section.textSize || "medium")} text-${escapeAttr(section.textAlign || "left")}">${escapeHtml(section.text || "")}</p>
        ${renderSectionBottomLinks(section)}
      </div>
    </section>
  `;
}

function renderCardItems(items, textSize, textAlign){
  if(!Array.isArray(items) || items.length === 0){
    return `<div class="card-item">カードデータがありません</div>`;
  }

  return items.map(item => {
    const title = item?.title || "";
    const text = item?.text || "";
    const image = item?.image || "";
    const link = item?.link || "#";

    const inner = `
      ${image ? `<img src="${escapeAttr(image)}" alt="${escapeAttr(title)}">` : ""}
      ${title ? `<h3 class="card-item-title text-${escapeAttr(textAlign || "left")}">${escapeHtml(title)}</h3>` : ""}
      ${text ? `<div class="section-text text-${escapeAttr(textSize || "medium")} text-${escapeAttr(textAlign || "left")}">${escapeHtml(text)}</div>` : ""}
    `;

    return `<div class="card-item">${wrapLink(link, inner, "card-link")}</div>`;
  }).join("");
}

function renderCard4(section){
  return `
    <section${getSectionAnchorAttr(section)} class="section" style="background:${escapeAttr(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title text-${escapeAttr(section.titleAlign || "left")}">${escapeHtml(section.title || "")}</h2>
        <div class="card-grid-4">
          ${renderCardItems(section.items || [], section.textSize || "medium", section.textAlign || "left")}
        </div>
        ${renderSectionBottomLinks(section)}
      </div>
    </section>
  `;
}

function renderCard3(section){
  return `
    <section${getSectionAnchorAttr(section)} class="section" style="background:${escapeAttr(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title text-${escapeAttr(section.titleAlign || "left")}">${escapeHtml(section.title || "")}</h2>
        <div class="card-grid-3">
          ${renderCardItems(section.items || [], section.textSize || "medium", section.textAlign || "left")}
        </div>
        ${renderSectionBottomLinks(section)}
      </div>
    </section>
  `;
}

function renderCard2(section){
  return `
    <section${getSectionAnchorAttr(section)} class="section" style="background:${escapeAttr(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title text-${escapeAttr(section.titleAlign || "left")}">${escapeHtml(section.title || "")}</h2>
        <div class="card-grid-2">
          ${renderCardItems(section.items || [], section.textSize || "medium", section.textAlign || "left")}
        </div>
        ${renderSectionBottomLinks(section)}
      </div>
    </section>
  `;
}

function renderMedia(section, reverse = false){
  const image = section.image
    ? wrapLink(
        section.link || "#",
        `<img src="${escapeAttr(section.image)}" alt="${escapeAttr(section.title || "")}">`,
        ""
      )
    : "";

  return `
    <section${getSectionAnchorAttr(section)} class="section align-${escapeAttr(section.alignY || "middle")}" style="background:${escapeAttr(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <div class="media-row ${reverse ? "reverse" : ""}">
          <div>
            <h2 class="section-title text-${escapeAttr(section.titleAlign || "left")}">${escapeHtml(section.title || "")}</h2>
            <p class="section-text text-${escapeAttr(section.textSize || "medium")} text-${escapeAttr(section.textAlign || "left")}">${escapeHtml(section.text || "")}</p>
            ${renderSectionBottomLinks(section)}
          </div>
          <div>${image}</div>
        </div>
      </div>
    </section>
  `;
}

function renderSection(section, idx){
  section = ensureSectionShape(section, idx);

  if(!section || section.enabled === false){
    return "";
  }

  switch(section.type){
    case "normal":
      return renderNormal(section);
    case "slider":
      return renderSlider(section, idx);
    case "card4":
      return renderCard4(section);
    case "card3":
      return renderCard3(section);
    case "card2":
      return renderCard2(section);
    case "card1-right":
      return renderMedia(section, false);
    case "card1-left":
      return renderMedia(section, true);
    default:
      return `
        <section${getSectionAnchorAttr(section)} class="section" style="background:#fff3cd">
          <div class="section-inner">
            <h2 class="section-title">未対応セクション</h2>
            <p class="section-text">type: ${escapeHtml(section.type || "")}</p>
          </div>
        </section>
      `;
  }
}

async function loadSections(){
  const container = document.getElementById("sectionsContainer");

  try{
    const res = await fetch("./data/sections.json?" + Date.now());
    let sections = await res.json();

    if(!Array.isArray(sections) || sections.length === 0){
      container.innerHTML = '<div class="empty-box">セクションがまだありません。</div>';
      return;
    }

    sections = sections.map((section, idx) => ensureSectionShape(section, idx));
    sections = ensureUniqueSectionIds(sections);

    container.innerHTML = sections.map((section, idx) => renderSection(section, idx)).join("");
    initSliders();

    if(location.hash){
      const target = document.querySelector(location.hash);
      if(target){
        setTimeout(() => {
          target.scrollIntoView({ behavior:"smooth", block:"start" });
        }, 50);
      }
    }
  }catch(error){
    container.innerHTML = '<div class="empty-box">sections.json の読み込みに失敗しました。</div>';
  }
}

function clearSliderTimers(){
  sliderTimers.forEach(timer => clearInterval(timer.id));
  sliderTimers = [];
  sliderTouchState = {};
}

function buildSliderDots(idx, total){
  const dotsWrap = document.getElementById(`slider-dots-${idx}`);
  if(!dotsWrap) return;

  let html = "";
  for(let i = 0; i < FIXED_DOT_COUNT; i++){
    html += `<button class="slider-dot${i === 0 ? " active" : ""}" type="button" onclick="goToSliderDot(${idx}, ${i})"></button>`;
  }
  dotsWrap.innerHTML = html;
  updateSliderDots(idx, 0, total);
}

function getFixedDotIndex(current, total){
  if(total <= 1) return 0;
  const ratio = current / (total - 1);
  return Math.max(0, Math.min(FIXED_DOT_COUNT - 1, Math.round(ratio * (FIXED_DOT_COUNT - 1))));
}

function getSlideIndexFromDot(dotIndex, total){
  if(total <= 1) return 0;
  const ratio = dotIndex / (FIXED_DOT_COUNT - 1);
  return Math.max(0, Math.min(total - 1, Math.round(ratio * (total - 1))));
}

function updateSliderDots(idx, current, total){
  const dotsWrap = document.getElementById(`slider-dots-${idx}`);
  if(!dotsWrap) return;
  const dots = dotsWrap.querySelectorAll(".slider-dot");
  const activeDot = getFixedDotIndex(current, total);
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i === activeDot);
  });
}

function attachSliderSwipe(shell, idx){
  sliderTouchState[idx] = { startX:0, startY:0 };

  shell.addEventListener("touchstart", (e) => {
    const t = e.touches[0];
    sliderTouchState[idx].startX = t.clientX;
    sliderTouchState[idx].startY = t.clientY;
  }, { passive:true });

  shell.addEventListener("touchend", (e) => {
    const state = sliderTouchState[idx];
    if(!state) return;

    const t = e.changedTouches[0];
    const diffX = t.clientX - state.startX;
    const diffY = t.clientY - state.startY;

    if(Math.abs(diffX) < 40) return;
    if(Math.abs(diffY) > Math.abs(diffX)) return;

    if(diffX < 0){
      moveSlider(idx, 1);
      resetSliderTimer(idx);
    }
    if(diffX > 0){
      moveSlider(idx, -1);
      resetSliderTimer(idx);
    }
  }, { passive:true });
}

function createSliderTimer(idx){
  const track = document.getElementById(`slider-track-${idx}`);
  if(!track) return null;

  const slides = track.querySelectorAll(".slider-slide");
  if(slides.length <= 1) return null;

  const id = setInterval(() => {
    moveSlider(idx, 1);
  }, 3000);

  return { idx, id };
}

function resetSliderTimer(idx){
  const item = sliderTimers.find(v => v.idx === idx);
  if(item){
    clearInterval(item.id);
    item.id = setInterval(() => {
      moveSlider(idx, 1);
    }, 3000);
  }
}

function initSliders(){
  clearSliderTimers();

  document.querySelectorAll(".slider-shell").forEach((shell) => {
    const idx = Number(shell.dataset.sliderIndex);
    const track = document.getElementById(`slider-track-${idx}`);
    if(!track) return;

    const slides = track.querySelectorAll(".slider-slide");
    const total = slides.length;

    if(total === 0) return;

    track.dataset.current = "0";
    updateSliderPosition(idx);
    if(total > 1){
      buildSliderDots(idx, total);
    }
    attachSliderSwipe(shell, idx);

    if(total > 1){
      const timer = createSliderTimer(idx);
      if(timer){
        sliderTimers.push(timer);
      }

      shell.addEventListener("mouseenter", () => {
        const item = sliderTimers.find(v => v.idx === idx);
        if(item){
          clearInterval(item.id);
        }
      });

      shell.addEventListener("mouseleave", () => {
        resetSliderTimer(idx);
      });
    }
  });
}

function updateSliderPosition(idx){
  const track = document.getElementById(`slider-track-${idx}`);
  if(!track) return;

  const slides = track.querySelectorAll(".slider-slide");
  const total = slides.length;
  if(total === 0) return;

  let current = Number(track.dataset.current || "0");
  if(current < 0) current = total - 1;
  if(current >= total) current = 0;

  track.dataset.current = String(current);
  track.style.transform = `translateX(-${current * 100}%)`;
  updateSliderDots(idx, current, total);
}

function moveSlider(idx, step){
  const track = document.getElementById(`slider-track-${idx}`);
  if(!track) return;

  const slides = track.querySelectorAll(".slider-slide");
  const total = slides.length;
  if(total === 0) return;

  let current = Number(track.dataset.current || "0");
  current += step;

  if(current >= total) current = 0;
  if(current < 0) current = total - 1;

  track.dataset.current = String(current);
  updateSliderPosition(idx);
}

function goToSliderDot(idx, dotIndex){
  const track = document.getElementById(`slider-track-${idx}`);
  if(!track) return;

  const slides = track.querySelectorAll(".slider-slide");
  const total = slides.length;
  if(total === 0) return;

  const target = getSlideIndexFromDot(dotIndex, total);
  track.dataset.current = String(target);
  updateSliderPosition(idx);
  resetSliderTimer(idx);
}

window.addEventListener("hashchange", () => {
  if(location.hash){
    const target = document.querySelector(location.hash);
    if(target){
      target.scrollIntoView({ behavior:"smooth", block:"start" });
    }
  }
});

async function init(){
  await loadConfig();
  await loadSections();
}

init();
</script>
