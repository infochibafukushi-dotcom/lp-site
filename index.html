<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護タクシーLP</title>
<style>
*{
  box-sizing:border-box;
}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:#222;
}
header{
  background:#ffffff;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:1000;
  flex-wrap:wrap;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  margin-right:8px;
  flex:0 0 auto;
}
.logo-img{
  width:44px;
  height:44px;
  object-fit:contain;
  display:none;
}
.logo-text{
  font-weight:bold;
  font-size:20px;
  line-height:1;
}
.top-buttons{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  flex-wrap:wrap;
}
.topbtn{
  padding:8px 12px;
  background:#007bff;
  color:#fff;
  border-radius:5px;
  text-decoration:none;
  display:inline-block;
}
main{
  padding:0 0 100px;
}
.section{
  padding:40px 20px;
}
.section-inner{
  max-width:1100px;
  margin:0 auto;
}
.section-title{
  margin:0 0 16px;
  font-size:28px;
}
.section-text{
  line-height:1.8;
  margin:12px 0 0;
}
.text-small{font-size:14px;}
.text-medium{font-size:16px;}
.text-large{font-size:20px;}

.align-top .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}
.align-middle .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.align-bottom .section-inner{
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.normal-image-wrap{
  margin-top:16px;
}
.normal-image{
  width:100%;
  max-width:700px;
  border-radius:12px;
  display:block;
  margin:0 auto;
}

.slider-shell{
  position:relative;
  margin-top:12px;
}
.slider-window{
  overflow:hidden;
  border-radius:12px;
}
.slider-track{
  display:flex;
  transition:transform 0.45s ease;
  will-change:transform;
}
.slider-slide{
  min-width:100%;
  flex:0 0 100%;
  padding:0;
}
.slider-slide a,
.slider-slide div{
  display:block;
}
.slider-slide img{
  width:100%;
  max-width:700px;
  height:auto;
  max-height:380px;
  object-fit:cover;
  border-radius:12px;
  display:block;
  margin:0 auto;
  background:#e9ecef;
}
.slider-empty{
  background:#fff;
  padding:18px;
  border-radius:12px;
  display:inline-block;
}
.slider-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:42px;
  height:42px;
  border:none;
  border-radius:999px;
  background:rgba(0,0,0,0.55);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  z-index:2;
}
.slider-arrow.left{
  left:10px;
}
.slider-arrow.right{
  right:10px;
}

.card-grid-4,
.card-grid-3,
.card-grid-2{
  display:grid;
  gap:16px;
  margin-top:16px;
}
.card-grid-4{
  grid-template-columns:repeat(4, 1fr);
}
.card-grid-3{
  grid-template-columns:repeat(3, 1fr);
}
.card-grid-2{
  grid-template-columns:repeat(2, 1fr);
}
.card-item{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.card-item img{
  width:100%;
  border-radius:10px;
  display:block;
  margin-bottom:10px;
}
.card-item-title{
  margin:0 0 8px;
  font-size:18px;
}
.card-link{
  display:block;
  text-decoration:none;
  color:inherit;
}

.media-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:center;
}
.media-row img{
  width:100%;
  border-radius:12px;
  display:block;
}
.media-row.reverse{
  direction:rtl;
}
.media-row.reverse > *{
  direction:ltr;
}

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ffffff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px;
  border-top:1px solid #ccc;
  z-index:1001;
  gap:8px;
}
.footerbtn{
  text-decoration:none;
  color:#000;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:80px;
  text-align:center;
}
.footerbtn img{
  width:52px;
  height:52px;
  object-fit:cover;
  border-radius:10px;
  display:block;
  margin-bottom:6px;
}

.adminPanel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:30px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  display:none;
  z-index:2000;
  border-radius:12px;
}
.adminPanel input{
  padding:10px;
  width:220px;
  margin-bottom:10px;
}
.adminPanel button{
  padding:10px 15px;
  background:#007bff;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:8px;
}
.empty-box{
  max-width:1100px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}
.hidden{
  display:none !important;
}

@media (max-width: 768px){
  .section{
    padding:28px 12px;
  }
  .section-title{
    font-size:22px;
  }
  .card-grid-4{
    grid-template-columns:repeat(4, 1fr);
  }
  .card-grid-3{
    grid-template-columns:repeat(3, 1fr);
  }
  .card-grid-2{
    grid-template-columns:repeat(2, 1fr);
  }
  .media-row{
    grid-template-columns:1fr;
  }
  .footerbtn{
    min-width:70px;
    font-size:12px;
  }
  .footerbtn img{
    width:46px;
    height:46px;
  }
  .slider-slide img{
    max-height:260px;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logoTrigger">
    <img id="logoImg" class="logo-img" alt="">
    <div class="logo-text" id="logoTextView">LOGO</div>
  </div>

  <div class="top-buttons" id="topButtons">
    <a class="topbtn" id="btn1" href="#">ボタン1</a>
    <a class="topbtn" id="btn2" href="#">ボタン2</a>
    <a class="topbtn" id="btn3" href="#">ボタン3</a>
  </div>
</header>

<main id="sectionsContainer">
  <div class="empty-box">読み込み中...</div>
</main>

<footer id="footerMenu">
  <a class="footerbtn" id="f1" href="#">
    <img id="f1img" class="hidden" alt="">
    <span id="f1text">電話</span>
  </a>
  <a class="footerbtn" id="f2" href="#">
    <img id="f2img" class="hidden" alt="">
    <span id="f2text">LINE</span>
  </a>
  <a class="footerbtn" id="f3" href="#">
    <img id="f3img" class="hidden" alt="">
    <span id="f3text">予約</span>
  </a>
</footer>

<div class="adminPanel" id="adminPanel">
  <h3>管理ログイン</h3>
  <input type="password" id="pass" placeholder="パスワード">
  <br>
  <button onclick="login()">ログイン</button>
</div>

<script>
let clickCount = 0;
let sitePassword = "95123";
let sliderTimers = [];

document.getElementById("logoTrigger").onclick = function(){
  clickCount++;
  if(clickCount >= 5){
    document.getElementById("adminPanel").style.display = "block";
    clickCount = 0;
  }
};

function login(){
  const input = document.getElementById("pass").value;
  if(input === sitePassword){
    alert("管理画面ログイン成功");
    location.href = "./admin.html";
  }else{
    alert("パスワード違います");
  }
}

function escapeHtml(text){
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function ensureConfigShape(config){
  if(!Array.isArray(config.buttons)){
    config.buttons = [
      { text:"ボタン1", link:"#", visible:true },
      { text:"ボタン2", link:"#", visible:true },
      { text:"ボタン3", link:"#", visible:true }
    ];
  }
  while(config.buttons.length < 3){
    config.buttons.push({ text:"ボタン", link:"#", visible:true });
  }

  if(!Array.isArray(config.footer)){
    config.footer = [
      { text:"電話", link:"#", visible:true, image:"" },
      { text:"LINE", link:"#", visible:true, image:"" },
      { text:"予約", link:"#", visible:true, image:"" }
    ];
  }
  while(config.footer.length < 3){
    config.footer.push({ text:"ボタン", link:"#", visible:true, image:"" });
  }

  config.buttons = config.buttons.map((b, i) => ({
    text: b?.text || `ボタン${i + 1}`,
    link: b?.link || "#",
    visible: b?.visible !== false
  }));

  const footerDefaults = ["電話", "LINE", "予約"];
  config.footer = config.footer.map((f, i) => ({
    text: f?.text || footerDefaults[i] || "ボタン",
    link: f?.link || "#",
    visible: f?.visible !== false,
    image: f?.image || ""
  }));

  config.logoImage = config.logoImage || "";
  return config;
}

function applyTopButton(el, data, fallbackText){
  el.innerText = data?.text || fallbackText;
  el.href = data?.link || "#";
  if(data?.visible === false){
    el.classList.add("hidden");
  }else{
    el.classList.remove("hidden");
  }
}

function applyFooterButton(anchorEl, imgEl, textEl, data, fallbackText){
  textEl.innerText = data?.text || fallbackText;
  anchorEl.href = data?.link || "#";

  if(data?.visible === false){
    anchorEl.classList.add("hidden");
  }else{
    anchorEl.classList.remove("hidden");
  }

  if(data?.image){
    imgEl.src = data.image;
    imgEl.classList.remove("hidden");
  }else{
    imgEl.src = "";
    imgEl.classList.add("hidden");
  }
}

async function loadConfig(){
  const res = await fetch("./data/config.json?" + Date.now());
  let config = await res.json();
  config = ensureConfigShape(config);

  const logoTextEl = document.getElementById("logoTextView");
  const logoImgEl = document.getElementById("logoImg");

  logoTextEl.innerText = config.logo || "";
  if(config.logoImage){
    logoImgEl.src = config.logoImage;
    logoImgEl.style.display = "block";
  }else{
    logoImgEl.src = "";
    logoImgEl.style.display = "none";
  }

  applyTopButton(document.getElementById("btn1"), config.buttons[0], "ボタン1");
  applyTopButton(document.getElementById("btn2"), config.buttons[1], "ボタン2");
  applyTopButton(document.getElementById("btn3"), config.buttons[2], "ボタン3");

  applyFooterButton(
    document.getElementById("f1"),
    document.getElementById("f1img"),
    document.getElementById("f1text"),
    config.footer[0],
    "電話"
  );
  applyFooterButton(
    document.getElementById("f2"),
    document.getElementById("f2img"),
    document.getElementById("f2text"),
    config.footer[1],
    "LINE"
  );
  applyFooterButton(
    document.getElementById("f3"),
    document.getElementById("f3img"),
    document.getElementById("f3text"),
    config.footer[2],
    "予約"
  );

  sitePassword = config.password || "95123";
}

function wrapLink(link, innerHtml, className = ""){
  if(link && link !== "#"){
    return `<a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer" class="${escapeHtml(className)}">${innerHtml}</a>`;
  }
  return innerHtml;
}

function renderNormal(section){
  const imageHtml = section.image
    ? `<img class="normal-image" src="${escapeHtml(section.image)}" alt="${escapeHtml(section.title || "")}">`
    : "";
  const linkedImage = wrapLink(section.link || "#", imageHtml, "");

  return `
    <section class="section align-${escapeHtml(section.alignY || "middle")}" style="background:${escapeHtml(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title">${escapeHtml(section.title || "")}</h2>
        <div class="normal-image-wrap">${linkedImage}</div>
        <p class="section-text text-${escapeHtml(section.textSize || "medium")}">${escapeHtml(section.text || "")}</p>
      </div>
    </section>
  `;
}

function renderSlider(section, idx){
  const images = Array.isArray(section.images) ? section.images : [];
  const slides = images.length
    ? images.map(src => {
        const image = `<img src="${escapeHtml(src)}" alt="${escapeHtml(section.title || "")}">`;
        return `<div class="slider-slide">${wrapLink(section.link || "#", image, "")}</div>`;
      }).join("")
    : `<div class="slider-empty">画像がまだありません</div>`;

  return `
    <section class="section align-${escapeHtml(section.alignY || "middle")}" style="background:${escapeHtml(section.bgColor || "#f8f9fa")}">
      <div class="section-inner">
        <h2 class="section-title">${escapeHtml(section.title || "")}</h2>
        <div class="slider-shell" data-slider-index="${idx}">
          <button class="slider-arrow left" type="button" onclick="moveSlider(${idx}, -1)">←</button>
          <div class="slider-window">
            <div class="slider-track" id="slider-track-${idx}">
              ${slides}
            </div>
          </div>
          <button class="slider-arrow right" type="button" onclick="moveSlider(${idx}, 1)">→</button>
        </div>
        <p class="section-text text-${escapeHtml(section.textSize || "medium")}">${escapeHtml(section.text || "")}</p>
      </div>
    </section>
  `;
}

function renderCardItems(items, textSize){
  if(!Array.isArray(items) || items.length === 0){
    return `<div class="card-item">カードデータがありません</div>`;
  }

  return items.map(item => {
    const title = item?.title || "";
    const text = item?.text || "";
    const image = item?.image || "";
    const link = item?.link || "#";

    const inner = `
      ${image ? `<img src="${escapeHtml(image)}" alt="${escapeHtml(title)}">` : ""}
      ${title ? `<h3 class="card-item-title">${escapeHtml(title)}</h3>` : ""}
      ${text ? `<div class="section-text text-${escapeHtml(textSize || "medium")}">${escapeHtml(text)}</div>` : ""}
    `;

    return `<div class="card-item">${wrapLink(link, inner, "card-link")}</div>`;
  }).join("");
}

function renderCard4(section){
  return `
    <section class="section" style="background:${escapeHtml(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title">${escapeHtml(section.title || "")}</h2>
        <div class="card-grid-4">
          ${renderCardItems(section.items || [], section.textSize || "medium")}
        </div>
      </div>
    </section>
  `;
}

function renderCard3(section){
  return `
    <section class="section" style="background:${escapeHtml(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title">${escapeHtml(section.title || "")}</h2>
        <div class="card-grid-3">
          ${renderCardItems(section.items || [], section.textSize || "medium")}
        </div>
      </div>
    </section>
  `;
}

function renderCard2(section){
  return `
    <section class="section" style="background:${escapeHtml(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <h2 class="section-title">${escapeHtml(section.title || "")}</h2>
        <div class="card-grid-2">
          ${renderCardItems(section.items || [], section.textSize || "medium")}
        </div>
      </div>
    </section>
  `;
}

function renderMedia(section, reverse = false){
  const image = section.image
    ? wrapLink(
        section.link || "#",
        `<img src="${escapeHtml(section.image)}" alt="${escapeHtml(section.title || "")}">`,
        ""
      )
    : "";

  return `
    <section class="section align-${escapeHtml(section.alignY || "middle")}" style="background:${escapeHtml(section.bgColor || "#ffffff")}">
      <div class="section-inner">
        <div class="media-row ${reverse ? "reverse" : ""}">
          <div>
            <h2 class="section-title">${escapeHtml(section.title || "")}</h2>
            <p class="section-text text-${escapeHtml(section.textSize || "medium")}">${escapeHtml(section.text || "")}</p>
          </div>
          <div>${image}</div>
        </div>
      </div>
    </section>
  `;
}

function renderSection(section, idx){
  if(!section || section.enabled === false){
    return "";
  }

  switch(section.type){
    case "normal":
      return renderNormal(section);
    case "slider":
      return renderSlider(section, idx);
    case "card4":
      return renderCard4(section);
    case "card3":
      return renderCard3(section);
    case "card2":
      return renderCard2(section);
    case "card1-right":
      return renderMedia(section, false);
    case "card1-left":
      return renderMedia(section, true);
    default:
      return `
        <section class="section" style="background:#fff3cd">
          <div class="section-inner">
            <h2 class="section-title">未対応セクション</h2>
            <p class="section-text">type: ${escapeHtml(section.type || "")}</p>
          </div>
        </section>
      `;
  }
}

async function loadSections(){
  const container = document.getElementById("sectionsContainer");

  try{
    const res = await fetch("./data/sections.json?" + Date.now());
    const sections = await res.json();

    if(!Array.isArray(sections) || sections.length === 0){
      container.innerHTML = '<div class="empty-box">セクションがまだありません。</div>';
      return;
    }

    container.innerHTML = sections.map((section, idx) => renderSection(section, idx)).join("");
    initSliders();
  }catch(error){
    container.innerHTML = '<div class="empty-box">sections.json の読み込みに失敗しました。</div>';
  }
}

function clearSliderTimers(){
  sliderTimers.forEach(timer => clearInterval(timer));
  sliderTimers = [];
}

function initSliders(){
  clearSliderTimers();

  document.querySelectorAll('.slider-shell').forEach((shell) => {
    const idx = Number(shell.dataset.sliderIndex);
    const track = document.getElementById(`slider-track-${idx}`);
    if(!track) return;

    const slides = track.querySelectorAll('.slider-slide');
    if(slides.length <= 1) return;

    track.dataset.current = "0";
    updateSliderPosition(idx);

    const timer = setInterval(() => {
      moveSlider(idx, 1);
    }, 3000);

    sliderTimers.push(timer);

    shell.addEventListener('mouseenter', () => clearInterval(timer));
  });
}

function updateSliderPosition(idx){
  const track = document.getElementById(`slider-track-${idx}`);
  if(!track) return;

  const slides = track.querySelectorAll('.slider-slide');
  const total = slides.length;
  if(total === 0) return;

  let current = Number(track.dataset.current || "0");
  if(current < 0) current = total - 1;
  if(current >= total) current = 0;

  track.dataset.current = String(current);
  track.style.transform = `translateX(-${current * 100}%)`;
}

function moveSlider(idx, step){
  const track = document.getElementById(`slider-track-${idx}`);
  if(!track) return;

  let current = Number(track.dataset.current || "0");
  current += step;
  track.dataset.current = String(current);
  updateSliderPosition(idx);
}

async function init(){
  await loadConfig();
  await loadSections();
}

init();
</script>
</body>
</html>
