<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFレイアウトテスト</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: #fff; font-family: "Yu Gothic", "Meiryo", sans-serif; }
  .a4-sheet { width: 794px; height: 1123px; background: #fff; overflow: hidden; }
  .a4-inner { width: 100%; height: 100%; overflow: hidden; padding: 30.236px; }
  .preview-loading { padding: 40px; text-align: center; color: #666; }
</style>
</head>
<body>
<div id="mount"><div class="preview-loading">生成中...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="../shared/libs/qrcode.min.js"></script>
<script src="../shared/estimate-qr.js"></script>
<script src="./estimate-pdf.js"></script>
<script>
(function(){
  const marginMm = 8;

  function mmToPx(mm){
    return mm * 96 / 25.4;
  }

  window.renderPdfTest = async function(){
    const mount = document.getElementById("mount");
    const data = window.__pdfTestData;
    if(!data){
      throw new Error("テストデータがありません");
    }
    if(!window.EstimatePdf){
      throw new Error("EstimatePdf が読み込まれていません");
    }
    const element = await window.EstimatePdf.buildPreviewElement(data);
    mount.innerHTML = "";
    const sheet = document.createElement("div");
    sheet.className = "a4-sheet";
    sheet.id = "a4Sheet";
    const inner = document.createElement("div");
    inner.className = "a4-inner";
    inner.style.padding = mmToPx(marginMm) + "px";
    inner.appendChild(element);
    sheet.appendChild(inner);
    mount.appendChild(sheet);
    document.body.setAttribute("data-pdf-ready", "1");
  };
})();
</script>
</body>
</html>
